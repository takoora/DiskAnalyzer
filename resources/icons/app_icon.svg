<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <clipPath id="lens7">
      <circle cx="220" cy="220" r="190"/>
    </clipPath>
    <radialGradient id="sheen7" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg7)"/>

  <!-- Dimmed background blocks -->
  <rect x="30" y="30" width="200" height="210" rx="6" fill="#a5d6a7" opacity="0.15"/>
  <rect x="240" y="30" width="240" height="100" rx="6" fill="#a5d6a7" opacity="0.15"/>
  <rect x="240" y="140" width="240" height="100" rx="6" fill="#a5d6a7" opacity="0.15"/>
  <rect x="30" y="250" width="450" height="70" rx="6" fill="#a5d6a7" opacity="0.15"/>
  <rect x="30" y="330" width="220" height="150" rx="6" fill="#a5d6a7" opacity="0.15"/>
  <rect x="260" y="330" width="220" height="150" rx="6" fill="#a5d6a7" opacity="0.15"/>

  <!-- Inside lens: treemap with percentages -->
  <g clip-path="url(#lens7)">
    <rect x="28" y="28" width="384" height="384" fill="#263238"/>

    <!-- Large block: 42% -->
    <rect x="38" y="38" width="215" height="230" rx="8" fill="#42a5f5"/>
    <text x="145" y="145" font-family="Helvetica Neue" font-size="42" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">42%</text>

    <!-- Top right: 18% -->
    <rect x="261" y="38" width="145" height="110" rx="8" fill="#ab47bc"/>
    <text x="333" y="100" font-family="Helvetica Neue" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">18%</text>

    <!-- Mid right: 12% -->
    <rect x="261" y="156" width="145" height="112" rx="8" fill="#66bb6a"/>
    <text x="333" y="220" font-family="Helvetica Neue" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">12%</text>

    <!-- Bottom left: 10% -->
    <rect x="38" y="276" width="108" height="118" rx="8" fill="#ffa726"/>
    <text x="92" y="343" font-family="Helvetica Neue" font-size="24" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">10%</text>

    <!-- Bottom mid: 8% -->
    <rect x="154" y="276" width="100" height="118" rx="8" fill="#ef5350"/>
    <text x="204" y="343" font-family="Helvetica Neue" font-size="24" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">8%</text>

    <!-- Bottom right-1: 5% -->
    <rect x="262" y="276" width="64" height="118" rx="8" fill="#26c6da"/>
    <text x="294" y="343" font-family="Helvetica Neue" font-size="20" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">5%</text>

    <!-- Bottom right-2 top: 3% -->
    <rect x="334" y="276" width="72" height="55" rx="8" fill="#ec407a"/>
    <text x="370" y="311" font-family="Helvetica Neue" font-size="18" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">3%</text>

    <!-- Bottom right-2 bottom: 2% -->
    <rect x="334" y="339" width="72" height="55" rx="8" fill="#78909c"/>
    <text x="370" y="374" font-family="Helvetica Neue" font-size="18" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">2%</text>

    <!-- Glass sheen -->
    <circle cx="220" cy="220" r="190" fill="url(#sheen7)"/>
  </g>

  <!-- Glass ring -->
  <circle cx="220" cy="220" r="190" fill="none" stroke="#c8e6c9" stroke-width="12" opacity="0.8"/>
  <circle cx="220" cy="220" r="197" fill="none" stroke="#1b5e20" stroke-width="3" opacity="0.3"/>

  <!-- Handle -->
  <rect x="375" y="375" width="34" height="140" rx="17" fill="#c8e6c9" opacity="0.85" transform="rotate(45 392 445)"/>
  <rect x="380" y="380" width="24" height="130" rx="12" fill="#a5d6a7" transform="rotate(45 392 445)"/>
</svg>
